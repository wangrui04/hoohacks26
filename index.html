<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Rush</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-container">
    <div id="prediction-panel">
      <div id="prediction-header">🔮 Gemini Prediction</div>
      <div id="prediction-content">Waiting for first move...</div>
    </div>

    <div id="hud">
      <span id="hud-text"></span>
    </div>

    <canvas id="grid"></canvas>

    <div id="buy-dialog" style="display: none">
      <span id="buy-info"></span>
      <button id="btn-buy">Buy</button>
      <button id="btn-cancel">Cancel</button>
    </div>

    <div id="action-bar">
      <button id="btn-upgrade">Upgrade an Asset</button>
      <button id="btn-skip">Skip Turn</button>
    </div>

    <div id="upgrade-dialog" style="display: none">
      <div id="upgrade-title">Select an asset to upgrade:</div>
      <div id="upgrade-list"></div>
      <button id="btn-upgrade-cancel">Cancel</button>
    </div>

    <div id="status">Click a mine or river to buy it.</div>
    <div id="round-log"></div>
  </div>

  <script src="consts.js"></script>
  <script src="utils.js"></script>
  <script src="player.js"></script>
  <script src="mine.js"></script>
  <script src="riverMine.js"></script>
  <script src="replayBuffer.js"></script>
  <script src="geminiPredictor.js"></script>
  <script src="ui.js"></script>
  <script src="renderer.js"></script>
  <script src="turnSystem.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script>
    // Fix SIGILL: disable SIMD/threading before ONNX Runtime loads
    window.ort = window.ort || {};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <script>
    ort.env.wasm.numThreads = 1;
    ort.env.wasm.simd = false;
  </script>
  <script src="ai.js"></script>
  <script src="ai.js"></script>
  <script src="index.js"></script>
</body>
</html>
